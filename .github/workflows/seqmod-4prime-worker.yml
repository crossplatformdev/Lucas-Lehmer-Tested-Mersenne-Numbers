name: LL 4-Prime Worker
run-name: "LL · p=${{ inputs.p1 }}, ${{ inputs.p2 || 'N/A' }}, ${{ inputs.p3 || 'N/A' }}, ${{ inputs.p4 || 'N/A' }}"

# Single-run Lucas-Lehmer test for a batch of up to 4 prime exponents.
#
# Dispatched by seqmod-range-matrix.yml (the coordinator). This workflow runs
# a single GitHub Actions job that tests up to 4 prime exponents for Mersenne
# primality. Each run is individually queryable by its name.
#
# If any exponent in the batch yields a Mersenne prime, the run name is
# updated via the GitHub API to reflect the discovery, e.g.:
#   "🎉 MERSENNE PRIME M_p · LL · p=p1, p2, p3, p4"
#
# Inputs:
#   p1                 – first prime exponent (required)
#   p2..p4             – additional prime exponents (optional; empty = skip)
#   time_limit_seconds – per-worker soft-stop in seconds (default 21420 = 5.95 h)
#   dry_run            – print plan only – do not run tests

on:
  workflow_dispatch:
    inputs:
      p1:
        description: "Prime exponent 1 (required)"
        required: true
        type: string
      p2:
        description: "Prime exponent 2 (optional)"
        required: false
        type: string
        default: ""
      p3:
        description: "Prime exponent 3 (optional)"
        required: false
        type: string
        default: ""
      p4:
        description: "Prime exponent 4 (optional)"
        required: false
        type: string
        default: ""
      time_limit_seconds:
        description: "Per-worker soft-stop in seconds (default 21420 = 5.95 h)"
        required: false
        type: string
        default: "21420"
      dry_run:
        description: "Print plan only – do not run tests"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  worker:
    name: "LL p=${{ inputs.p1 }}, ${{ inputs.p2 || 'N/A' }}, ${{ inputs.p3 || 'N/A' }}, ${{ inputs.p4 || 'N/A' }}"
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq g++ make libboost-dev

      - name: Build bignum
        run: make bin/bignum

      - name: Verify binary
        run: |
          echo "=== Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID} ==="
          echo "Job: worker"
          LL_SWEEP_MODE=p LL_MIN_EXPONENT=2 LL_MAX_EXPONENT=5 ./bin/bignum 0 1
          echo "Binary OK."

      - name: Run Lucas-Lehmer test
        id: run_ll
        run: |
          set -uo pipefail

          # ── Input validation ───────────────────────────────────────────
          # Reject inputs that are not pure non-negative integers before
          # they reach arithmetic expressions or file paths.
          _validate_prime_input() {
            local name="$1" val="$2" required="$3"
            if [ -z "$val" ]; then
              [ "$required" = "required" ] && { echo "::error::${name} is required."; exit 1; }
              return 0
            fi
            if ! [[ "$val" =~ ^[0-9]+$ ]]; then
              echo "::error::${name} must be a non-negative integer, got '${val}'."; exit 1
            fi
            if (( val < 2 )); then
              echo "::error::${name} must be >= 2, got ${val}."; exit 1
            fi
          }
          _validate_prime_input "p1" "${{ inputs.p1 }}" "required"
          _validate_prime_input "p2" "${{ inputs.p2 }}" "optional"
          _validate_prime_input "p3" "${{ inputs.p3 }}" "optional"
          _validate_prime_input "p4" "${{ inputs.p4 }}" "optional"

          TL="${{ inputs.time_limit_seconds }}"
          if ! [[ "$TL" =~ ^[0-9]+$ ]] || (( TL < 60 )); then
            echo "::error::time_limit_seconds must be an integer >= 60, got '${TL}'."; exit 1
          fi
          # ───────────────────────────────────────────────────────────────

          # Collect non-empty prime inputs and compute the test range.
          PRIMES=()
          for P in "${{ inputs.p1 }}" "${{ inputs.p2 }}" "${{ inputs.p3 }}" "${{ inputs.p4 }}"; do
            [ -n "$P" ] && PRIMES+=("$P")
          done

          if [ ${#PRIMES[@]} -eq 0 ]; then
            echo "::error::No prime exponents provided."
            exit 1
          fi

          IFS=$'\n' SORTED=($(printf '%s\n' "${PRIMES[@]}" | sort -n)); unset IFS
          P_MIN="${SORTED[0]}"
          P_MAX="${SORTED[${#SORTED[@]}-1]}"
          ITERS=$(( P_MAX - P_MIN + 1 ))

          # Filename-safe label built from the actual inputs (not SORTED).
          LABEL="p${{ inputs.p1 }}${{ inputs.p2 != '' && format('-{0}', inputs.p2) || '' }}${{ inputs.p3 != '' && format('-{0}', inputs.p3) || '' }}${{ inputs.p4 != '' && format('-{0}', inputs.p4) || '' }}"
          mkdir -p worker_out/
          CSV_PATH="worker_out/${LABEL}.csv"
          STATE_PATH="worker_out/${LABEL}_state.json"

          echo "=== Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID} ==="
          echo "Primes : ${{ inputs.p1 }}, ${{ inputs.p2 }}, ${{ inputs.p3 }}, ${{ inputs.p4 }}"
          echo "Range  : [${P_MIN}, ${P_MAX}]  (${ITERS} candidates)"

          DRY_RUN="${{ inputs.dry_run }}"
          if [ "${DRY_RUN}" = "true" ]; then
          echo "DRY RUN: would run bignum on [${P_MIN}, ${P_MAX}]"
            echo "exit_code=0"    >> "$GITHUB_OUTPUT"
            echo "elapsed_secs=0" >> "$GITHUB_OUTPUT"
            echo "csv_path="      >> "$GITHUB_OUTPUT"
            exit 0
          fi

          START_SEC=$(date +%s)
          set +e
          timeout "${{ inputs.time_limit_seconds }}" \
          env LL_SWEEP_MODE=p \
          LL_MIN_EXPONENT="${P_MIN}" \
          LL_MAX_EXPONENT="${P_MAX}" \
          LL_BENCH_OUTPUT="${CSV_PATH}" \
          LL_PROGRESS=0 \
          ./bin/bignum 0 4
          EXIT_CODE=$?
          set -e
          # exit 124 means timeout(1) killed the process — treat as timed out.
          [ "${EXIT_CODE}" -eq 124 ] && EXIT_CODE=42
          ELAPSED=$(( $(date +%s) - START_SEC ))

          echo "Exit code : ${EXIT_CODE}"
          echo "Elapsed   : ${ELAPSED}s"
          echo "exit_code=${EXIT_CODE}"    >> "$GITHUB_OUTPUT"
          echo "elapsed_secs=${ELAPSED}"  >> "$GITHUB_OUTPUT"
          echo "csv_path=${CSV_PATH}"     >> "$GITHUB_OUTPUT"

          # Always exit 0 here so subsequent steps (rename, upload) always run.
          exit 0

      - name: Rename run if Mersenne prime found
        if: always() && !inputs.dry_run
        id: tag_run
        env:
          CSV_PATH: ${{ steps.run_ll.outputs.csv_path }}
          PRIMES_PART: "p=${{ inputs.p1 }}, ${{ inputs.p2 || 'N/A' }}, ${{ inputs.p3 || 'N/A' }}, ${{ inputs.p4 || 'N/A' }}"
        run: |
          set -uo pipefail

          if [ -z "${CSV_PATH}" ] || [ ! -f "${CSV_PATH}" ]; then
            echo "No CSV output found – skipping rename check."
            echo "known_primes="  >> "$GITHUB_OUTPUT"
            echo "new_primes="    >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Collect all exponents whose is_prime column is "true".
          # bignum LL_BENCH_OUTPUT CSV format: p,is_prime,time_sec
          MERSENNE_EXPS=$(grep -E ",true," "${CSV_PATH}" | cut -d, -f1 | tr '\n' ' ' | sed 's/ $//' || true)

          if [ -z "${MERSENNE_EXPS}" ]; then
            echo "No Mersenne primes found in this batch – run name unchanged."
            echo "known_primes="  >> "$GITHUB_OUTPUT"
            echo "new_primes="    >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Mersenne prime exponent(s) found: ${MERSENNE_EXPS}"

          # Classify each found exponent as known or new; build the run title.
          RENAME_CMD=$(MERSENNE_EXPS="${MERSENNE_EXPS}" python3 - <<'PYEOF'
          import os

          KNOWN = {
              2, 3, 5, 7, 13, 17, 19, 31, 61, 89, 107, 127, 521, 607, 1279, 2203,
              2281, 3217, 4253, 4423, 9689, 9941, 11213, 19937, 21701, 23209, 44497,
              86243, 110503, 132049, 216091, 756839, 859433, 1257787, 1398269,
              2976221, 3021377, 6972593, 13466917, 20996011, 24036583, 25964951,
              30402457, 32582657, 37156667, 42643801, 43112609, 57885161, 74207281,
              77232917, 82589933, 136279841,
          }

          exps = [int(e) for e in os.environ["MERSENNE_EXPS"].split()]
          known = [e for e in exps if e in KNOWN]
          new   = [e for e in exps if e not in KNOWN]

          gh_out = os.environ.get("GITHUB_OUTPUT", "")
          if gh_out:
              with open(gh_out, "a") as f:
                  f.write(f"known_primes={' '.join(str(e) for e in known)}\n")
                  f.write(f"new_primes={' '.join(str(e) for e in new)}\n")

          if new:
              print(f"🥇 NOT in known list: {new}", flush=True)
          if known:
              print(f"🍋 Known Mersenne primes: {known}", flush=True)

          primes_part = os.environ.get("PRIMES_PART", "")
          if new:
              m_labels = ", ".join(f"M_{e}" for e in new)
              title = f"🥇 NEW PRIME {m_labels} · LL · {primes_part}"
          else:
              m_labels = ", ".join(f"M_{e}" for e in known)
              title = f"🍋 MERSENNE PRIME {m_labels} · LL · {primes_part}"

          # Emit the title so the shell can capture it.
          print(f"__TITLE__:{title}")
          PYEOF
          )

          NEW_TITLE=$(echo "${RENAME_CMD}" | grep '^__TITLE__:' | sed 's/^__TITLE__://')

          if [ -z "${NEW_TITLE}" ]; then
            echo "No title generated – skipping rename."
            exit 0
          fi

          echo "Renaming run to: ${NEW_TITLE}"

          gh api \
            --method PATCH \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            -f "display_title=${NEW_TITLE}" \
          && echo "Run renamed successfully." \
          || echo "WARNING: failed to rename run (non-fatal)."

      - name: Upload results
        if: always() && !inputs.dry_run
        uses: actions/upload-artifact@v6
        with:
          name: "ll-4prime-p${{ inputs.p1 }}${{ inputs.p2 != '' && format('-{0}', inputs.p2) || '' }}${{ inputs.p3 != '' && format('-{0}', inputs.p3) || '' }}${{ inputs.p4 != '' && format('-{0}', inputs.p4) || '' }}"
          path: worker_out/
          retention-days: 90
          if-no-files-found: warn

      - name: Write step summary
        if: always()
        run: |
          EXIT="${{ steps.run_ll.outputs.exit_code }}"
          ELAPSED="${{ steps.run_ll.outputs.elapsed_secs }}"
          DRY_RUN="${{ inputs.dry_run }}"
          if [ "${DRY_RUN}" = "true" ]; then
            STATUS_LABEL="📋 dry run"
            ELAPSED_FMT="n/a (dry run)"
          else
            case "${EXIT}" in
              0)   STATUS_LABEL="✅ completed" ;;
              42)  STATUS_LABEL="⏱ timed out (soft stop)" ;;
              "")  STATUS_LABEL="⏭ skipped" ;;
              *)   STATUS_LABEL="❌ error (exit ${EXIT})" ;;
            esac
            if [ -n "${ELAPSED}" ] && [ "${ELAPSED}" -ge 0 ] 2>/dev/null; then
              H=$(( ELAPSED / 3600 ))
              M=$(( (ELAPSED % 3600) / 60 ))
              S=$(( ELAPSED % 60 ))
              ELAPSED_FMT=$(printf "%02d:%02d:%02d" "${H}" "${M}" "${S}")
            else
              ELAPSED_FMT="n/a"
            fi
          fi
          {
            echo "## LL 4-Prime Worker"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Primes | p=${{ inputs.p1 }}, ${{ inputs.p2 || 'N/A' }}, ${{ inputs.p3 || 'N/A' }}, ${{ inputs.p4 || 'N/A' }} |"
            echo "| Elapsed time | ${ELAPSED_FMT} |"
            echo "| Status | ${STATUS_LABEL} |"
            echo "| Workflow run | [${GITHUB_RUN_ID}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}) |"
          } >> "$GITHUB_STEP_SUMMARY"
