name: Power-Range Prime Sweep (64 Buckets)

# Manual-only workflow: tests all prime exponents across 64 power-of-two
# exponent ranges (batched into groups of ≤ 1000 primes per worker job).
#
# Bucket definition (1-indexed):
#   B_1  = [2, 2]               (normalized)
#   B_n  = [2^(n-1), 2^n - 1]  for n in [2, 64]
#   B_64 = [2^63, 2^64 - 1]
#
# Runner: ubuntu-24.04 — the GitHub-hosted free-tier Linux runner with the
#   most vCPUs (4) and RAM (16 GB).  ubuntu-22.04 only provides 2 vCPUs/7 GB.
#   macOS runners (3 vCPU M1) are incompatible because the build requires apt-get.
#
# Workflow stages:
#   1. plan    – builds the batch matrix JSON (one entry per ≤ 1000-prime batch)
#   2. build   – compiles the binary once and caches it
#   3. worker  – up to 20 parallel jobs (free-tier concurrency limit), one per batch
#   4. merge   – downloads all artifacts and produces a combined summary

on:
  workflow_call:
    outputs:
      new_discovery:
        description: "Whether a new Mersenne prime was discovered"
        value: ${{ jobs.merge.outputs.new_discovery }}
    inputs:
      bucket_start:
        description: "First bucket to run (1-64)"
        required: false
        type: string
        default: "1"
      bucket_end:
        description: "Last bucket to run (1-64)"
        required: false
        type: string
        default: "64"
      threads:
        description: "Worker threads per job (0 = all cores)"
        required: false
        type: string
        default: "0"
      reverse_order:
        description: "Test largest exponent first within each bucket"
        required: false
        type: boolean
        default: false
      dry_run:
        description: "Print exponent plan only – do not run Lucas-Lehmer tests"
        required: false
        type: boolean
        default: false
      max_exponents_per_job:
        description: "Safety cap: maximum exponents to test per bucket job (0 = no cap)"
        required: false
        type: string
        default: "0"
      stop_after_first_prime_result:
        description: "Stop each bucket after the first new Mersenne prime candidate"
        required: false
        type: boolean
        default: false
      resume_from_exponent:
        description: "Skip exponents below this value (0 = no skip)"
        required: false
        type: string
        default: "0"
      benchmark_mode:
        description: "Skip is_prime_exponent() check (safe only for known-prime lists)"
        required: false
        type: boolean
        default: false
      progress:
        description: "Enable per-exponent iteration progress output"
        required: false
        type: boolean
        default: false
      progress_interval_iters:
        description: "Print progress every N iterations (default: 10000)"
        required: false
        type: string
        default: "10000"
      progress_interval_seconds:
        description: "Also print progress every N seconds, 0 = off (default: 0)"
        required: false
        type: string
        default: "0"
  workflow_dispatch:
    inputs:
      bucket_start:
        description: "First bucket to run (1-64)"
        required: false
        type: string
        default: "1"
      bucket_end:
        description: "Last bucket to run (1-64)"
        required: false
        type: string
        default: "64"
      threads:
        description: "Worker threads per job (0 = all cores)"
        required: false
        type: string
        default: "0"
      reverse_order:
        description: "Test largest exponent first within each bucket"
        required: false
        type: boolean
        default: false
      dry_run:
        description: "Print exponent plan only – do not run Lucas-Lehmer tests"
        required: false
        type: boolean
        default: false
      max_exponents_per_job:
        description: "Safety cap: maximum exponents to test per bucket job (0 = no cap)"
        required: false
        type: string
        default: "0"
      stop_after_first_prime_result:
        description: "Stop each bucket after the first new Mersenne prime candidate"
        required: false
        type: boolean
        default: false
      resume_from_exponent:
        description: "Skip exponents below this value (0 = no skip)"
        required: false
        type: string
        default: "0"
      benchmark_mode:
        description: "Skip is_prime_exponent() check (safe only for known-prime lists)"
        required: false
        type: boolean
        default: false
      progress:
        description: "Enable per-exponent iteration progress output"
        required: false
        type: boolean
        default: false
      progress_interval_iters:
        description: "Print progress every N iterations (default: 10000)"
        required: false
        type: string
        default: "10000"
      progress_interval_seconds:
        description: "Also print progress every N seconds, 0 = off (default: 0)"
        required: false
        type: string
        default: "0"

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────
  # Stage 1: Plan – validate inputs and build the batch matrix.
  #
  # For each selected bucket the prime exponents are enumerated
  # and partitioned into contiguous batches of at most 1000
  # primes.  Each batch becomes one entry in the worker matrix.
  # ──────────────────────────────────────────────────────────
  plan:
    runs-on: ubuntu-24.04  # free-tier: 4 vCPU, 16 GB RAM (most of any free Linux runner)
    outputs:
      batch_matrix: ${{ steps.build-matrix.outputs.batch_matrix }}
      batch_count:  ${{ steps.build-matrix.outputs.batch_count }}
    steps:
      - name: Validate bucket range
        run: |
          START="${{ inputs.bucket_start }}"
          END="${{ inputs.bucket_end }}"
          if ! [[ "$START" =~ ^[0-9]+$ ]] || ! [[ "$END" =~ ^[0-9]+$ ]]; then
            echo "::error::bucket_start and bucket_end must be integers."
            exit 1
          fi
          if (( START < 1 || START > 64 || END < 1 || END > 64 || START > END )); then
            echo "::error::bucket_start ($START) and bucket_end ($END) must both be in [1,64] with start <= end."
            exit 1
          fi
          echo "Bucket range validated: ${START}..${END}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile plan tool
        run: |
          mkdir -p bin
          gcc -std=c11 -O2 -o bin/split_bucket_batches src/split_bucket_batches.c

      - name: Build batch matrix JSON
        id: build-matrix
        run: |
          START="${{ inputs.bucket_start }}"
          END="${{ inputs.bucket_end }}"

          # Print human-readable plan (always useful for audit).
          bin/split_bucket_batches \
            --bucket-start "${START}" \
            --bucket-end   "${END}" \
            --batch-size   1000 \
            --dry-run

          # Generate the JSON matrix (errors if > 256 batches).
          BATCH_MATRIX=$(bin/split_bucket_batches \
            --bucket-start "${START}" \
            --bucket-end   "${END}" \
            --batch-size   1000)

          BATCH_COUNT=$(bin/split_bucket_batches \
            --bucket-start "${START}" \
            --bucket-end   "${END}" \
            --batch-size   1000 \
            --count-only)

          echo "batch_matrix=${BATCH_MATRIX}" >> "$GITHUB_OUTPUT"
          echo "batch_count=${BATCH_COUNT}"   >> "$GITHUB_OUTPUT"
          echo "Total batches: ${BATCH_COUNT}"

  # ──────────────────────────────────────────────────────────
  # Stage 2: Build – compile the binary once and cache it
  # ──────────────────────────────────────────────────────────
  build:
    needs: plan
    runs-on: ubuntu-24.04  # free-tier: 4 vCPU, 16 GB RAM (most of any free Linux runner)
    timeout-minutes: 10
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute cache key
        id: cache-key
        run: |
          echo "key=bignum-bucket-${{ hashFiles('src/BigNum.cpp', 'Makefile') }}" >> "$GITHUB_OUTPUT"

      - name: Restore cached binary
        id: cache-restore
        uses: actions/cache@v4
        with:
          path: bin/bignum
          key: ${{ steps.cache-key.outputs.key }}

      - name: Install toolchain
        if: steps.cache-restore.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ make libboost-dev pkg-config

      - name: Build release binary
        if: steps.cache-restore.outputs.cache-hit != 'true'
        run: make all

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: bignum-binary
          path: bin/bignum
          retention-days: 1

  # ──────────────────────────────────────────────────────────
  # Stage 3: Workers – one job per batch (≤ 1000 primes each)
  #
  # The batch matrix produced by the plan step drives this job.
  # Each batch uses LL_RESUME_FROM_EXPONENT + LL_MAX_EXPONENTS_PER_JOB
  # to select its slice of the bucket prime list without changing
  # the C++ binary.
  # ──────────────────────────────────────────────────────────
  worker:
    needs: [plan, build]
    runs-on: ubuntu-24.04  # free-tier: 4 vCPU, 16 GB RAM (most of any free Linux runner)
    # timeout-minutes is set to 355 (5h 55m) as a hard GitHub-level safety net.
    # The binary itself is given LL_JOB_TIMEOUT_SECONDS=18000 (5h) so it stops
    # gracefully and uploads partial results before this limit is reached.
    timeout-minutes: 355
    strategy:
      fail-fast: false
      max-parallel: 20   # GitHub public free-tier hard limit for concurrent jobs
      matrix:
        include: ${{ fromJson(needs.plan.outputs.batch_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: bignum-binary
          path: bin/

      - name: Make binary executable
        run: chmod +x bin/bignum

      - name: Install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libboost-dev

      - name: Run batch ${{ matrix.worker_name }}
        id: run
        run: |
          echo "=== Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID} ==="
          echo "Job: worker – ${{ matrix.worker_name }}"
          echo "  bucket       : ${{ matrix.bucket_n }} [${{ matrix.bucket_min }}, ${{ matrix.bucket_max }}]"
          echo "  batch        : ${{ matrix.batch_index }} / ${{ matrix.batch_count }}"
          echo "  prime indices: ${{ matrix.batch_prime_start_index }}..${{ matrix.batch_prime_end_index }}"
          echo "  exponent range: ${{ matrix.batch_min_exponent }}..${{ matrix.batch_max_exponent }}"
          echo "  batch size   : ${{ matrix.batch_size }}"

          mkdir -p batch_out/

          LL_SWEEP_MODE=power_bucket_primes \
          LL_BUCKET_N=${{ matrix.bucket_n }} \
          LL_THREADS=${{ inputs.threads }} \
          LL_DRY_RUN=${{ inputs.dry_run && '1' || '0' }} \
          LL_REVERSE_ORDER=${{ inputs.reverse_order && '1' || '0' }} \
          LL_RESUME_FROM_EXPONENT=${{ matrix.batch_min_exponent }} \
          LL_MAX_EXPONENTS_PER_JOB=${{ matrix.batch_size }} \
          LL_STOP_AFTER_FIRST_PRIME_RESULT=${{ inputs.stop_after_first_prime_result && '1' || '0' }} \
          LL_BENCHMARK_MODE=${{ inputs.benchmark_mode && '1' || '0' }} \
          LL_PROGRESS=${{ inputs.progress && '1' || '0' }} \
          LL_PROGRESS_INTERVAL_ITERS=${{ inputs.progress_interval_iters }} \
          LL_PROGRESS_INTERVAL_SECONDS=${{ inputs.progress_interval_seconds }} \
          LL_JOB_TIMEOUT_SECONDS=18000 \
          LL_OUTPUT_DIR=batch_out/ \
          GITHUB_STEP_SUMMARY="${GITHUB_STEP_SUMMARY}" \
          ./bin/bignum 0 ${{ inputs.threads }}

          if [ -f "batch_out/bucket_${{ matrix.bucket_n }}/discovery_event.json" ]; then
            echo "new_discovery=true" >> "$GITHUB_OUTPUT"
            echo "::notice title=NEW MERSENNE PRIME FOUND::Batch ${{ matrix.worker_name }} found a new prime!"
          else
            echo "new_discovery=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload batch artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.worker_name }}-results
          path: batch_out/bucket_${{ matrix.bucket_n }}/
          retention-days: 90
          if-no-files-found: warn

  # ──────────────────────────────────────────────────────────
  # Stage 4: Merge – aggregate all batch results
  # ──────────────────────────────────────────────────────────
  merge:
    needs: worker
    if: always()
    runs-on: ubuntu-24.04  # free-tier: 4 vCPU, 16 GB RAM (most of any free Linux runner)
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all batch artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bucket-*-batch-*-results
          path: batch_artifacts/
          merge-multiple: false

      - name: Reorganize batch artifacts for merge script
        run: |
          # The merge script scans recursively, so just ensure the root dir
          # is accessible.  Copy all downloaded artifacts into bucket_out/
          # preserving subdirectory structure.
          mkdir -p bucket_out/
          if [ -d batch_artifacts/ ]; then
            cp -r batch_artifacts/. bucket_out/
          fi

      - name: Install Python (for merge script)
        run: python3 --version  # already available on ubuntu-latest

      - name: Merge batch results
        id: merge
        run: |
          python3 scripts/merge_bucket_results.py \
            --dir bucket_out \
            --out bucket_out/merged
          if [ -f bucket_out/merged_new_discoveries.json ]; then
            echo "new_discovery=true" >> "$GITHUB_OUTPUT"
          else
            echo "new_discovery=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Write workflow step summary
        if: always()
        run: |
          echo "## Power Bucket Prime Sweep – Final Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Workflow run:** ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f bucket_out/merged_summary.md ]; then
            cat bucket_out/merged_summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "_(no merged summary produced)_" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Emit discovery notice
        if: steps.merge.outputs.new_discovery == 'true'
        run: |
          echo "::notice title=NEW MERSENNE PRIME FOUND::See merged_new_discoveries.json artifact!"

      - name: Upload merged results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bucket-sweep-merged-results
          path: |
            bucket_out/merged_all_results.csv
            bucket_out/merged_all_results.json
            bucket_out/merged_summary.md
            bucket_out/merged_new_discoveries.json
          retention-days: 90
          if-no-files-found: warn
