name: Power-Range Prime Sweep (64 Buckets)

# Manual-only workflow: tests all prime exponents across 64 power-of-two
# exponent ranges (batched into groups sized to fit within the time limit).
#
# Bucket definition (1-indexed):
#   B_1  = [2, 2]               (normalized)
#   B_n  = [2^(n-1), 2^n - 1]  for n in [2, 64]
#   B_64 = [2^63, 2^64 - 1]
#
# Runner: ubuntu-24.04 — the GitHub-hosted free-tier Linux runner with the
#   most vCPUs (4) and RAM (16 GB).  ubuntu-22.04 only provides 2 vCPUs/7 GB.
#   macOS runners (3 vCPU M1) are incompatible because the build requires apt-get.
#
# Batch sizing strategy:
#   The plan stage uses the inverse rule of three to compute per-bucket batch
#   sizes from measured benchmark timing data (see REPORT_MERSENNE_EXPONENTS-*).
#   The formula is: batch_size = floor(time_limit_seconds / worst_case_time_per_prime)
#   This ensures each worker completes in well under the 6-hour GitHub cap.
#
# Workflow stages:
#   1. plan    – auto-detects last tested exponent, builds the batch matrix
#                with per-bucket batch sizes derived from timing data
#   2. build   – compiles the binary once and caches it
#   3. worker  – up to 20 parallel jobs (free-tier concurrency limit), one per batch
#   4. merge   – downloads all artifacts and produces a combined summary

on:
  workflow_call:
    outputs:
      new_discovery:
        description: "Whether a new Mersenne prime was discovered"
        value: ${{ jobs.merge.outputs.new_discovery }}
    inputs:
      bucket_start:
        description: "First bucket to run (1-64)"
        required: false
        type: string
        default: "1"
      bucket_end:
        description: "Last bucket to run (1-64)"
        required: false
        type: string
        default: "64"
      threads:
        description: "Worker threads per job (0 = all cores)"
        required: false
        type: string
        default: "0"
      reverse_order:
        description: "Test largest exponent first within each bucket"
        required: false
        type: boolean
        default: false
      dry_run:
        description: "Print exponent plan only – do not run Lucas-Lehmer tests"
        required: false
        type: boolean
        default: false
      max_exponents_per_job:
        description: "Safety cap: maximum exponents to test per bucket job (0 = no cap)"
        required: false
        type: string
        default: "0"
      stop_after_first_prime_result:
        description: "Stop each bucket after the first new Mersenne prime candidate"
        required: false
        type: boolean
        default: false
      resume_from_exponent:
        description: "Skip exponents ≤ this value (0 = use auto_resume result or no skip)"
        required: false
        type: string
        default: "0"
      auto_resume:
        description: "Auto-detect the last tested exponent from bucket_artifacts/ and resume from there (overridden by resume_from_exponent if > 0)"
        required: false
        type: boolean
        default: true
      time_limit_minutes:
        description: "Per-worker time budget in minutes; batch sizes are scaled per-bucket so each worker finishes within this limit (default: 360 = 6 h)"
        required: false
        type: string
        default: "360"
      target_workers:
        description: "Target number of parallel workers (default: 250). The total primes are divided across this many workers; the time-limit cap still applies as a safety bound."
        required: false
        type: string
        default: "250"
      benchmark_mode:
        description: "Skip is_prime_exponent() check (safe only for known-prime lists)"
        required: false
        type: boolean
        default: false
      progress:
        description: "Enable per-exponent iteration progress output"
        required: false
        type: boolean
        default: false
      progress_interval_iters:
        description: "Print progress every N iterations (default: 10000)"
        required: false
        type: string
        default: "10000"
      progress_interval_seconds:
        description: "Also print progress every N seconds, 0 = off (default: 0)"
        required: false
        type: string
        default: "0"
  workflow_dispatch:
    inputs:
      bucket_start:
        description: "First bucket to run (1-64)"
        required: false
        type: string
        default: "1"
      bucket_end:
        description: "Last bucket to run (1-64)"
        required: false
        type: string
        default: "64"
      threads:
        description: "Worker threads per job (0 = all cores)"
        required: false
        type: string
        default: "0"
      reverse_order:
        description: "Test largest exponent first within each bucket"
        required: false
        type: boolean
        default: false
      dry_run:
        description: "Print exponent plan only – do not run Lucas-Lehmer tests"
        required: false
        type: boolean
        default: false
      max_exponents_per_job:
        description: "Safety cap: maximum exponents to test per bucket job (0 = no cap)"
        required: false
        type: string
        default: "0"
      stop_after_first_prime_result:
        description: "Stop each bucket after the first new Mersenne prime candidate"
        required: false
        type: boolean
        default: false
      resume_from_exponent:
        description: "Skip exponents ≤ this value (0 = use auto_resume result or no skip)"
        required: false
        type: string
        default: "0"
      auto_resume:
        description: "Auto-detect the last tested exponent from bucket_artifacts/ and resume from there (overridden by resume_from_exponent if > 0)"
        required: false
        type: boolean
        default: true
      time_limit_minutes:
        description: "Per-worker time budget in minutes; batch sizes are scaled per-bucket so each worker finishes within this limit (default: 360 = 6 h)"
        required: false
        type: string
        default: "360"
      target_workers:
        description: "Target number of parallel workers (default: 250). The total primes are divided across this many workers; the time-limit cap still applies as a safety bound."
        required: false
        type: string
        default: "250"
      benchmark_mode:
        description: "Skip is_prime_exponent() check (safe only for known-prime lists)"
        required: false
        type: boolean
        default: false
      progress:
        description: "Enable per-exponent iteration progress output"
        required: false
        type: boolean
        default: false
      progress_interval_iters:
        description: "Print progress every N iterations (default: 10000)"
        required: false
        type: string
        default: "10000"
      progress_interval_seconds:
        description: "Also print progress every N seconds, 0 = off (default: 0)"
        required: false
        type: string
        default: "0"

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────
  # Stage 1: Plan – validate inputs and build the batch matrix.
  #
  # The plan tool counts all remaining primes, then splits them
  # into ceil(total / target_workers) primes per batch, targeting
  # ~250 parallel workers.  The per-bucket time-limit cap ensures
  # no single worker can exceed the 6-hour GitHub Actions limit.
  # Already-tested exponents are skipped when auto_resume=true.
  # ──────────────────────────────────────────────────────────
  plan:
    runs-on: ubuntu-24.04  # free-tier: 4 vCPU, 16 GB RAM (most of any free Linux runner)
    outputs:
      batch_matrix:      ${{ steps.build-matrix.outputs.batch_matrix }}
      batch_count:       ${{ steps.build-matrix.outputs.batch_count }}
      effective_resume:  ${{ steps.build-matrix.outputs.effective_resume }}
    steps:
      - name: Validate bucket range
        run: |
          START="${{ inputs.bucket_start }}"
          END="${{ inputs.bucket_end }}"
          if ! [[ "$START" =~ ^[0-9]+$ ]] || ! [[ "$END" =~ ^[0-9]+$ ]]; then
            echo "::error::bucket_start and bucket_end must be integers."
            exit 1
          fi
          if (( START < 1 || START > 64 || END < 1 || END > 64 || START > END )); then
            echo "::error::bucket_start ($START) and bucket_end ($END) must both be in [1,64] with start <= end."
            exit 1
          fi
          TIME_LIMIT="${{ inputs.time_limit_minutes }}"
          if ! [[ "$TIME_LIMIT" =~ ^[0-9]+$ ]] || (( TIME_LIMIT < 1 )); then
            echo "::error::time_limit_minutes must be a positive integer, got '${TIME_LIMIT}'."
            exit 1
          fi
          TARGET_WORKERS="${{ inputs.target_workers }}"
          if ! [[ "$TARGET_WORKERS" =~ ^[0-9]+$ ]]; then
            echo "::error::target_workers must be a non-negative integer, got '${TARGET_WORKERS}'."
            exit 1
          fi
          echo "Bucket range validated: ${START}..${END}"
          echo "time_limit_minutes validated: ${TIME_LIMIT}"
          echo "target_workers validated: ${TARGET_WORKERS}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile plan tool
        run: |
          mkdir -p bin
          gcc -std=c11 -O2 -o bin/split_bucket_batches src/split_bucket_batches.c

      - name: Auto-detect last tested exponent
        id: auto-resume
        run: |
          # Scan committed bucket_artifacts/ filenames for the highest tested
          # exponent.  This is the resume point if auto_resume is enabled.
          AUTO_EXP=$(python3 scripts/find_resume_exponent.py bucket_artifacts/ 2>/dev/null || echo "0")
          echo "last_exponent=${AUTO_EXP}" >> "$GITHUB_OUTPUT"
          echo "Auto-resume scan: last tested exponent = ${AUTO_EXP}"

      - name: Build batch matrix JSON
        id: build-matrix
        run: |
          START="${{ inputs.bucket_start }}"
          END="${{ inputs.bucket_end }}"

          # Determine effective resume exponent:
          #   - explicit resume_from_exponent input wins if > 0
          #   - otherwise fall back to the auto-detected value (when auto_resume=true)
          INPUT_RESUME="${{ inputs.resume_from_exponent }}"
          AUTO_EXP="${{ steps.auto-resume.outputs.last_exponent }}"
          AUTO_ENABLED="${{ inputs.auto_resume }}"

          if [[ "${INPUT_RESUME}" -gt 0 ]]; then
            EFFECTIVE_RESUME="${INPUT_RESUME}"
            echo "Resume: using explicit input resume_from_exponent=${EFFECTIVE_RESUME}"
          elif [[ "${AUTO_ENABLED}" == "true" && "${AUTO_EXP}" -gt 0 ]]; then
            EFFECTIVE_RESUME="${AUTO_EXP}"
            echo "Resume: auto-detected last tested exponent=${EFFECTIVE_RESUME}"
          else
            EFFECTIVE_RESUME="0"
            echo "Resume: starting from the beginning (no resume point)"
          fi

          # Per-worker time limit (seconds) for per-bucket batch sizing.
          TIME_LIMIT_SEC=$(( ${{ inputs.time_limit_minutes }} * 60 ))
          echo "Time limit per worker: ${TIME_LIMIT_SEC}s (${{ inputs.time_limit_minutes }} min)"

          # Print human-readable plan (always useful for audit).
          bin/split_bucket_batches \
            --bucket-start          "${START}" \
            --bucket-end            "${END}" \
            --target-workers        "${{ inputs.target_workers }}" \
            --time-limit-seconds    "${TIME_LIMIT_SEC}" \
            --resume-from-exponent  "${EFFECTIVE_RESUME}" \
            --dry-run

          # Generate the JSON matrix (errors if > 256 batches).
          BATCH_MATRIX=$(bin/split_bucket_batches \
            --bucket-start          "${START}" \
            --bucket-end            "${END}" \
            --target-workers        "${{ inputs.target_workers }}" \
            --time-limit-seconds    "${TIME_LIMIT_SEC}" \
            --resume-from-exponent  "${EFFECTIVE_RESUME}")

          BATCH_COUNT=$(bin/split_bucket_batches \
            --bucket-start          "${START}" \
            --bucket-end            "${END}" \
            --target-workers        "${{ inputs.target_workers }}" \
            --time-limit-seconds    "${TIME_LIMIT_SEC}" \
            --resume-from-exponent  "${EFFECTIVE_RESUME}" \
            --count-only)

          echo "batch_matrix=${BATCH_MATRIX}"     >> "$GITHUB_OUTPUT"
          echo "batch_count=${BATCH_COUNT}"        >> "$GITHUB_OUTPUT"
          echo "effective_resume=${EFFECTIVE_RESUME}" >> "$GITHUB_OUTPUT"
          echo "Total batches: ${BATCH_COUNT}"

  # ──────────────────────────────────────────────────────────
  # Stage 2: Build – compile the binary once and cache it
  # ──────────────────────────────────────────────────────────
  build:
    needs: plan
    runs-on: ubuntu-24.04  # free-tier: 4 vCPU, 16 GB RAM (most of any free Linux runner)
    timeout-minutes: 10
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute cache key
        id: cache-key
        run: |
          echo "key=bignum-bucket-${{ hashFiles('src/BigNum.cpp', 'Makefile') }}" >> "$GITHUB_OUTPUT"

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ make libboost-dev pkg-config

      - name: Build release binary
        run: make all

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: bignum-binary
          path: bin/bignum
          retention-days: 1

  # ──────────────────────────────────────────────────────────
  # Stage 3: Workers – one job per batch, targeting ~250 workers
  #
  # The batch matrix produced by the plan step drives this job.
  # With target_workers=250 and max-parallel=256, all workers
  # start concurrently (up to the GitHub matrix hard cap of 256),
  # so the entire sweep finishes in roughly the time it takes the
  # slowest single worker batch.
  # ──────────────────────────────────────────────────────────
  worker:
    needs: [plan, build]
    runs-on: ubuntu-24.04  # free-tier: 4 vCPU, 16 GB RAM (most of any free Linux runner)
    # No timeout-minutes: Mersenne prime search must not be artificially stopped.
    # Note: GitHub-hosted runners enforce a hard 6-hour cap regardless.
    # For unbounded runs (e.g., large buckets), use a self-hosted runner.
    strategy:
      fail-fast: false
      max-parallel: 256   # allow all workers to run concurrently (GitHub matrix hard cap)
      matrix:
        include: ${{ fromJson(needs.plan.outputs.batch_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: bignum-binary
          path: bin/

      - name: Make binary executable
        run: chmod +x bin/bignum

      - name: Install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libboost-dev

      - name: Run batch ${{ matrix.worker_name }}
        id: run
        run: |
          echo "=== Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID} ==="
          echo "Job: worker – ${{ matrix.worker_name }}"
          echo "  bucket       : ${{ matrix.bucket_n }} [${{ matrix.bucket_min }}, ${{ matrix.bucket_max }}]"
          echo "  batch        : ${{ matrix.batch_index }} / ${{ matrix.batch_count }}"
          echo "  prime indices: ${{ matrix.batch_prime_start_index }}..${{ matrix.batch_prime_end_index }}"
          echo "  exponent range: ${{ matrix.batch_min_exponent }}..${{ matrix.batch_max_exponent }}"
          echo "  batch size   : ${{ matrix.batch_size }}"

          mkdir -p batch_out/

          LL_SWEEP_MODE=power_bucket_primes \
          LL_BUCKET_N=${{ matrix.bucket_n }} \
          LL_THREADS=${{ inputs.threads }} \
          LL_FFT_THREADS=2 \
          LL_FFT_ALLOW_NESTED=1 \
          LL_DRY_RUN=${{ inputs.dry_run && '1' || '0' }} \
          LL_REVERSE_ORDER=${{ inputs.reverse_order && '1' || '0' }} \
          LL_RESUME_FROM_EXPONENT=${{ matrix.batch_min_exponent }} \
          LL_MAX_EXPONENTS_PER_JOB=${{ matrix.batch_size }} \
          LL_STOP_AFTER_FIRST_PRIME_RESULT=${{ inputs.stop_after_first_prime_result && '1' || '0' }} \
          LL_BENCHMARK_MODE=${{ inputs.benchmark_mode && '1' || '0' }} \
          LL_PROGRESS=${{ inputs.progress && '1' || '0' }} \
          LL_PROGRESS_INTERVAL_ITERS=${{ inputs.progress_interval_iters }} \
          LL_PROGRESS_INTERVAL_SECONDS=${{ inputs.progress_interval_seconds }} \
          LL_OUTPUT_DIR=batch_out/ \
          GITHUB_STEP_SUMMARY="${GITHUB_STEP_SUMMARY}" \
          ./bin/bignum 0 ${{ inputs.threads }}

          if [ -f "batch_out/bucket_${{ matrix.bucket_n }}/discovery_event.json" ]; then
            echo "new_discovery=true" >> "$GITHUB_OUTPUT"
            echo "::notice title=NEW MERSENNE PRIME FOUND::Batch ${{ matrix.worker_name }} found a new prime!"
          else
            echo "new_discovery=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload batch artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.worker_name }}-results
          path: batch_out/bucket_${{ matrix.bucket_n }}/
          retention-days: 90
          if-no-files-found: warn

  # ──────────────────────────────────────────────────────────
  # Stage 4: Merge – aggregate all batch results
  # ──────────────────────────────────────────────────────────
  merge:
    needs: worker
    if: always()
    runs-on: ubuntu-24.04  # free-tier: 4 vCPU, 16 GB RAM (most of any free Linux runner)
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all batch artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bucket-*-batch-*-results
          path: batch_artifacts/
          merge-multiple: false

      - name: Reorganize batch artifacts for merge script
        run: |
          # The merge script scans recursively, so just ensure the root dir
          # is accessible.  Copy all downloaded artifacts into bucket_out/
          # preserving subdirectory structure.
          mkdir -p bucket_out/
          if [ -d batch_artifacts/ ]; then
            cp -r batch_artifacts/. bucket_out/
          fi

      - name: Extract committed artifacts for already-tested buckets
        run: |
          # When auto_resume skips all exponents in the requested range (all
          # primes already committed in bucket_artifacts/), no worker jobs ran
          # and no fresh artifacts were downloaded.  Extract the committed zip
          # archives for the requested bucket range so the merge script finds
          # real result data rather than an empty set.
          FRESH=$([ -d batch_artifacts/ ] && find batch_artifacts/ -mindepth 1 -maxdepth 1 -type d | wc -l || echo 0)
          if [ "${FRESH}" -gt 0 ]; then
            echo "Fresh batch artifacts present (${FRESH}), skipping committed extraction."
            exit 0
          fi
          START="${{ inputs.bucket_start }}"
          END="${{ inputs.bucket_end }}"
          if [ "${START}" -gt "${END}" ]; then
            echo "No bucket range to extract (start=${START} > end=${END})."
            exit 0
          fi
          mkdir -p bucket_out/
          EXTRACTED=0
          for n in $(seq "${START}" "${END}"); do
            BUCKET_N=$(printf "%02d" "${n}")
            for zipfile in bucket_artifacts/bucket-${BUCKET_N}-batch-*-results.zip; do
              [ -f "${zipfile}" ] || continue
              ARTIFACT_NAME=$(basename "${zipfile}" .zip)
              DEST="bucket_out/${ARTIFACT_NAME}"
              mkdir -p "${DEST}"
              python3 -m zipfile -e "${zipfile}" "${DEST}"
              echo "Extracted committed artifact: ${zipfile} -> ${DEST}/"
              EXTRACTED=$(( EXTRACTED + 1 ))
            done
          done
          echo "Extracted ${EXTRACTED} committed artifact(s) for buckets ${START}..${END}."

      - name: Install Python (for merge script)
        run: python3 --version  # already available on ubuntu-latest

      - name: Merge batch results
        id: merge
        run: |
          python3 scripts/merge_bucket_results.py \
            --dir bucket_out \
            --out bucket_out/merged
          if [ -f bucket_out/merged_new_discoveries.json ]; then
            echo "new_discovery=true" >> "$GITHUB_OUTPUT"
          else
            echo "new_discovery=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Write workflow step summary
        if: always()
        run: |
          {
            echo "## Power Bucket Prime Sweep – Final Summary"
            echo ""
            echo "**Workflow run:** ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo ""
            if [ -f bucket_out/merged_summary.md ]; then
              # Omit the composite-exponents table: it can exceed GitHub's 1 MB
              # step-summary limit.  The full report is in the bucket-sweep-merged-results artifact.
              awk '/^## Composite Exponents Tested/{
                print
                print ""
                print "_Full composite table omitted – see the `bucket-sweep-merged-results` artifact for the complete report._"
                exit
              } {print}' bucket_out/merged_summary.md
            else
              echo "_(no merged summary produced)_"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Emit discovery notice
        if: steps.merge.outputs.new_discovery == 'true'
        run: |
          echo "::notice title=NEW MERSENNE PRIME FOUND::See merged_new_discoveries.json artifact!"

      - name: Upload merged results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bucket-sweep-merged-results
          path: |
            bucket_out/merged_all_results.csv
            bucket_out/merged_all_results.json
            bucket_out/merged_summary.md
            bucket_out/merged_new_discoveries.json
          retention-days: 90
          if-no-files-found: warn
          compression-level: 9
