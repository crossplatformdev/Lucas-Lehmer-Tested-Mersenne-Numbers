name: Seqmod Range Matrix
run-name: "Seqmod Range · ${{ inputs.low_cap }}..${{ inputs.high_cap }}"

# Coordinator workflow: enumerates all prime exponents in [low_cap, high_cap]
# via a segmented sieve, groups them into batches of exactly 4, then creates a
# new GitHub Actions run for every batch by dispatching seqmod-4prime-worker.yml.
#
# For n primes in [low_cap, high_cap] this creates ceil(n / 4) new action runs,
# each with a single worker.  The four exponents appear in every dispatched run's
# name so they can be queried directly via the GitHub Actions UI or API.
#
# If a dispatched worker finds a Mersenne prime it additionally renames its own
# run to "🎉 MERSENNE PRIME M_p · LL · p=p1, p2, p3, p4".
#
# Workflow stages:
#   1. validate          – reject invalid inputs early
#   2. build             – compile bin/bignum (sanity-check before dispatch)
#   3. plan_and_dispatch – sieve [low_cap, high_cap], create batches of 4 primes,
#                          call gh api to dispatch one new run per batch
#
# Inputs:
#   low_cap            – lower bound of exponent range (inclusive, ≥ 2)
#   high_cap           – upper bound of exponent range (inclusive, ≥ low_cap)
#   time_limit_seconds – per-worker soft-stop in seconds (default 21420 = 5.95 h)
#   dry_run            – print plan only – do not dispatch worker runs

on:
  workflow_dispatch:
    inputs:
      low_cap:
        description: "Lower bound of exponent range (inclusive, ≥ 2)"
        required: true
        type: string
      high_cap:
        description: "Upper bound of exponent range (inclusive, ≥ low_cap)"
        required: true
        type: string
      time_limit_seconds:
        description: "Per-worker soft-stop in seconds (default 21420 = 5.95 h)"
        required: false
        type: string
        default: "21420"
      dry_run:
        description: "Print plan only – do not dispatch worker runs"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  actions: write

env:
  # Opt into Node.js 24 for all JavaScript actions (suppresses the Node 20
  # deprecation warning from actions/upload-artifact and download-artifact).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ──────────────────────────────────────────────────────────
  # Stage 1: Validate – reject invalid inputs early.
  # ──────────────────────────────────────────────────────────
  validate:
    name: Validate inputs
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    steps:
      - name: Validate
        run: |
          set -euo pipefail

          LOW="${{ inputs.low_cap }}"
          HIGH="${{ inputs.high_cap }}"
          TL="${{ inputs.time_limit_seconds }}"

          if ! [[ "$LOW" =~ ^[0-9]+$ ]]; then
            echo "::error::low_cap must be a non-negative integer, got '${LOW}'."
            exit 1
          fi
          if ! [[ "$HIGH" =~ ^[0-9]+$ ]]; then
            echo "::error::high_cap must be a non-negative integer, got '${HIGH}'."
            exit 1
          fi
          if (( LOW < 2 )); then
            echo "::error::low_cap must be >= 2, got ${LOW}."
            exit 1
          fi
          if (( HIGH < LOW )); then
            echo "::error::high_cap (${HIGH}) must be >= low_cap (${LOW})."
            exit 1
          fi
          if ! [[ "$TL" =~ ^[0-9]+$ ]] || (( TL < 60 )); then
            echo "::error::time_limit_seconds must be >= 60, got '${TL}'."
            exit 1
          fi

          echo "Inputs validated: range=[${LOW}, ${HIGH}], threads=4 (fixed), time_limit=${TL}s"
          echo "Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

  # ──────────────────────────────────────────────────────────
  # Stage 2: Build – compile bin/bignum as a sanity
  #           check before dispatching worker runs.
  # ──────────────────────────────────────────────────────────
  build:
    name: Build and verify binary
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq g++ make libboost-dev

      - name: Build bignum
        run: make bin/bignum

      - name: Verify binary
        run: |
          echo "=== Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID} ==="
          echo "Job: build"
          LL_SWEEP_MODE=p LL_MIN_EXPONENT=2 LL_MAX_EXPONENT=5 ./bin/bignum 0 1
          echo "Binary OK."

  # ──────────────────────────────────────────────────────────
  # Stage 3: Plan and dispatch – enumerate all prime exponents
  #           in [low_cap, high_cap], group into batches of 4,
  #           and dispatch one new seqmod-4prime-worker.yml run
  #           per batch.
  # ──────────────────────────────────────────────────────────
  plan_and_dispatch:
    name: Plan batches and dispatch worker runs
    needs: [validate, build]
    runs-on: ubuntu-24.04
    # Allow up to 6 hours for large ranges
    # (at ~1.4 dispatches/s: ~20 000 batches ≈ 4 h for 80 000 primes).
    timeout-minutes: 360
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Sieve primes and dispatch 4-prime worker runs
        run: |
          set -euo pipefail

          export LOW="${{ inputs.low_cap }}"
          export HIGH="${{ inputs.high_cap }}"
          export DRY_RUN="${{ inputs.dry_run }}"
          export TIME_LIMIT="${{ inputs.time_limit_seconds }}"

          echo "=== Seqmod Range Matrix – Dispatch Phase ==="
          echo "Range   : [${LOW}, ${HIGH}]"
          echo "Threads : 4 (fixed)"
          echo "Dry run : ${DRY_RUN}"
          echo "Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          echo ""

          python3 - <<'PYEOF'
          import json, math, os, subprocess, sys, time

          low_cap    = int(os.environ["LOW"])
          high_cap   = int(os.environ["HIGH"])
          dry_run    = os.environ["DRY_RUN"] == "true"
          time_limit = os.environ["TIME_LIMIT"]
          repo       = os.environ["GITHUB_REPOSITORY"]
          ref_name   = os.environ["GITHUB_REF_NAME"]

          # ── Segmented sieve to enumerate primes in [low_cap, high_cap] ──
          # Uses O(sqrt(high_cap)) memory for small primes plus one segment
          # at a time.  Handles ranges up to ~136 M without issue.
          sqrt_hi = int(math.isqrt(high_cap)) + 1

          # Small primes up to sqrt(high_cap) via simple sieve of Eratosthenes.
          small = bytearray(sqrt_hi + 1)   # 0 = prime, 1 = composite
          small[0] = small[1] = 1
          for i in range(2, sqrt_hi + 1):
              if not small[i]:
                  for j in range(i * i, sqrt_hi + 1, i):
                      small[j] = 1
          small_primes = [i for i in range(2, sqrt_hi + 1) if not small[i]]

          SEG = max(sqrt_hi, 1 << 17)   # 128 KiB per segment

          def iter_primes(lo_start, hi_end):
              """Yield all primes in [lo_start, hi_end]."""
              lo = max(lo_start, 2)
              while lo <= hi_end:
                  hi  = min(lo + SEG - 1, hi_end)
                  seg = bytearray(hi - lo + 1)   # 0 = prime
                  for p in small_primes:
                      start = max(p * p, ((lo + p - 1) // p) * p)
                      for j in range(start - lo, hi - lo + 1, p):
                          seg[j] = 1
                  for i, comp in enumerate(seg):
                      if not comp:
                          yield lo + i
                  lo = hi + 1

          def dispatch_batch(batch_index, primes):
              """Dispatch one seqmod-4prime-worker.yml run for `primes` (1–4 elements)."""
              padded = (primes + ["", "", "", ""])[:4]
              p1, p2, p3, p4 = padded
              label = ", ".join(str(p) for p in primes)
              print(f"  Batch {batch_index:6d}: [{label}]")
              inputs = {
                  "p1": str(p1),
                  "p2": str(p2),
                  "p3": str(p3),
                  "p4": str(p4),
                  "time_limit_seconds": time_limit,
                  "dry_run":            dry_run,
              }
              payload = json.dumps({"ref": ref_name, "inputs": inputs})
              if dry_run:
                  print(f"    (dry_run: would dispatch seqmod-4prime-worker.yml)")
                  return True
              result = subprocess.run(
                  ["gh", "api",
                   "--method", "POST",
                   f"repos/{repo}/actions/workflows/seqmod-4prime-worker.yml/dispatches",
                   "--input", "-"],
                  input=payload,
                  capture_output=True, text=True,
              )
              if result.returncode != 0:
                  print(f"    ERROR: {result.stderr.strip()}", file=sys.stderr)
                  return False
              print(f"    → dispatched OK")
              return True

          # Count primes first so we can print a progress estimate.
          print("Counting primes in range...", file=sys.stderr)
          total_primes = sum(1 for _ in iter_primes(low_cap, high_cap))
          total_batches = math.ceil(total_primes / 4)
          print(
              f"Total prime exponents in [{low_cap}, {high_cap}]: {total_primes}",
              file=sys.stderr,
          )
          print(
              f"Batches to dispatch (ceil({total_primes}/4)): {total_batches}",
              file=sys.stderr,
          )

          if total_primes == 0:
              print("No prime exponents found in range – nothing to dispatch.", file=sys.stderr)
              sys.exit(0)

          # Group primes into batches of 4 and dispatch each batch.
          BATCH_SIZE = 4
          batch       = []
          batch_index = 0
          total_ok    = 0
          total_err   = 0

          for prime in iter_primes(low_cap, high_cap):
              batch.append(prime)
              if len(batch) == BATCH_SIZE:
                  ok = dispatch_batch(batch_index, batch)
                  total_ok   += ok
                  total_err  += not ok
                  batch       = []
                  batch_index += 1
                  if not dry_run:
                      # DISPATCH_INTERVAL_SEC: 0.7 s → ~1.4 dispatches/s.
                      # GitHub's secondary rate limit for workflow_dispatch is
                      # roughly 1 000 requests/minute; 1.4/s is well within it.
                      DISPATCH_INTERVAL_SEC = 0.7
                      time.sleep(DISPATCH_INTERVAL_SEC)

          # Flush the final partial batch (1–3 primes).
          if batch:
              ok = dispatch_batch(batch_index, batch)
              total_ok   += ok
              total_err  += not ok
              batch_index += 1

          print(f"\n{'─' * 60}")
          print(f"Total batches dispatched : {batch_index}")
          print(f"Succeeded                : {total_ok}")
          if total_err:
              print(f"Errors                   : {total_err}", file=sys.stderr)
              sys.exit(1)
          PYEOF

          echo ""
          echo "Dispatch complete."
          echo "Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

      - name: Write step summary
        if: always()
        run: |
          {
            echo "## 📋 Seqmod Range Matrix – Dispatch Summary"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Range | [${{ inputs.low_cap }}, ${{ inputs.high_cap }}] |"
            echo "| Threads per worker | 4 (fixed) |"
            echo "| Per-worker time limit | ${{ inputs.time_limit_seconds }} s |"
            echo "| Dry run | ${{ inputs.dry_run }} |"
            echo "| Worker workflow | seqmod-4prime-worker.yml |"
            echo "| Workflow run | [${GITHUB_RUN_ID}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}) |"
          } >> "$GITHUB_STEP_SUMMARY"
