name: Prime Sweep Wrapper

# Simple two-input orchestrator that calls the full Power-Range Prime Sweep
# (64 Buckets) workflow and presents the merged results report at the end.
#
# Inputs:
#   sweep_range – which portion of the prime exponents to test:
#                   Full       = all primes in [bucket_min, bucket_top]
#                   Upper Half = the upper half by count (ascending order)
#                   Lower Half = the lower half by count (ascending order)
#   bucket_min  – first bucket to sweep  (1-64)
#   bucket_top  – last  bucket to sweep  (bucket_min to 64)
#
# Half definition (used when sweep_range ≠ Full):
#   All prime exponents in the selected bucket range are enumerated in
#   ascending order.  The midpoint is total // 2.
#   Lower Half = first  mid  primes  (indices 0 .. mid-1)
#   Upper Half = last total-mid primes  (indices mid .. total-1)
#
# When bucket_min == bucket_top (single bucket) the primes within that one
# bucket are split; running Lower Half and Upper Half in two separate manual
# dispatches is equivalent to one Full run.
#
# The called workflow enforces the GitHub Actions matrix limit of 256 jobs,
# so this wrapper guarantees no more than 256 parallel worker tasks are ever
# launched, regardless of the selected range.

on:
  workflow_dispatch:
    inputs:
      sweep_range:
        description: "Portion of prime exponents to test (primes ordered ascending by value)"
        required: false
        type: choice
        default: "Full"
        options:
          - "full"
          - "upper_half"
          - "lower_half"
      bucket_min:
        description: "Lower bucket start (1-64)"
        required: true
        type: string
        default: "1"
      bucket_top:
        description: "Upper bucket end (bucket_min to 64)"
        required: true
        type: string
        default: "64"
      auto_resume:
        description: "Auto-detect the last tested exponent from bucket_artifacts/ and skip already-done primes (default: true)"
        required: false
        type: boolean
        default: true
      time_limit_minutes:
        description: "Per-worker time budget in minutes; batch sizes shrink automatically for larger exponents (default: 360 = 6 h)"
        required: false
        type: string
        default: "360"
      target_workers:
        description: "Target number of parallel workers (default: 250). Primes are split across this many workers so they run concurrently."
        required: false
        type: string
        default: "250"

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────
  # Stage 1: Validate – reject invalid bucket ranges early,
  # before any compute resources are allocated.
  # ──────────────────────────────────────────────────────────
  validate:
    runs-on: ubuntu-24.04
    steps:
      - name: Validate inputs
        run: |
          MIN="${{ inputs.bucket_min }}"
          TOP="${{ inputs.bucket_top }}"
          if ! [[ "$MIN" =~ ^[0-9]+$ ]] || ! [[ "$TOP" =~ ^[0-9]+$ ]]; then
            echo "::error::bucket_min and bucket_top must be integers."
            exit 1
          fi
          if (( MIN < 1 || MIN > 64 || TOP < MIN || TOP > 64 )); then
            echo "::error::bucket_min ($MIN) must be in [1,64] and bucket_top ($TOP) must be in [bucket_min,64]."
            exit 1
          fi
          TIME_LIMIT="${{ inputs.time_limit_minutes }}"
          if ! [[ "$TIME_LIMIT" =~ ^[0-9]+$ ]] || (( TIME_LIMIT < 1 )); then
            echo "::error::time_limit_minutes must be a positive integer, got '${TIME_LIMIT}'."
            exit 1
          fi
          TARGET_WORKERS="${{ inputs.target_workers }}"
          if ! [[ "$TARGET_WORKERS" =~ ^[0-9]+$ ]]; then
            echo "::error::target_workers must be a non-negative integer, got '${TARGET_WORKERS}'."
            exit 1
          fi
          echo "Input validated: buckets ${MIN}..${TOP}, sweep_range='${{ inputs.sweep_range }}'"
          echo "time_limit_minutes validated: ${TIME_LIMIT}"
          echo "target_workers validated: ${TARGET_WORKERS}"

  # ──────────────────────────────────────────────────────────
  # Stage 2: Sweep – delegate to the full Power-Range Prime
  # Sweep workflow.  All worker concurrency, batching, and the
  # 256-task cap are enforced there.
  # ──────────────────────────────────────────────────────────
  sweep:
    needs: validate
    uses: ./.github/workflows/power-range-prime-sweep.yml
    with:
      bucket_start:       ${{ inputs.bucket_min }}
      bucket_end:         ${{ inputs.bucket_top }}
      auto_resume:        ${{ inputs.auto_resume }}
      time_limit_minutes: ${{ inputs.time_limit_minutes }}
      target_workers:     ${{ inputs.target_workers }}
      prime_half:         ${{ inputs.sweep_range }}

  # ──────────────────────────────────────────────────────────
  # Stage 3: Report – download the merged artifact produced by
  # the sweep and present the full summary in this run's step
  # summary so it is visible directly in the wrapper's UI.
  # ──────────────────────────────────────────────────────────
  report:
    needs: sweep
    if: success() || failure()
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Download merged results artifact
        uses: actions/download-artifact@v4
        with:
          name: bucket-sweep-merged-results
          path: merged_results/

      - name: Zip report with max compression
        run: |
          if [ -f merged_results/merged_summary.md ]; then
            zip -9 merged_summary_report.zip merged_results/merged_summary.md
          fi

      - name: Upload compressed report
        if: hashFiles('merged_summary_report.zip') != ''
        uses: actions/upload-artifact@v4
        with:
          name: prime-sweep-report
          path: merged_summary_report.zip
          retention-days: 90
          compression-level: 9

      - name: Present sweep report
        run: |
          {
            echo "## Prime Sweep Wrapper – Final Report"
            echo ""
            echo "**Sweep range:** ${{ inputs.sweep_range }}"
            echo "**Buckets swept:** ${{ inputs.bucket_min }}–${{ inputs.bucket_top }}"
            echo "**Workflow run:** ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo ""
            if [ -f merged_results/merged_summary.md ]; then
              # Omit the composite-exponents table: it can exceed GitHub's 1 MB
              # step-summary limit.  The full report is in the prime-sweep-report artifact.
              awk '/^## Composite Exponents Tested/{
                print
                print ""
                print "_Full composite table omitted – download the `prime-sweep-report` artifact for the complete report._"
                exit
              } {print}' merged_results/merged_summary.md
            else
              echo "_(merged summary not available – the sweep may have produced no results)_"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Emit discovery notice
        if: needs.sweep.outputs.new_discovery == 'true'
        run: |
          echo "::notice title=NEW MERSENNE PRIME FOUND::See merged_new_discoveries.json in the bucket-sweep-merged-results artifact!"
          echo "## 🚨 NEW MERSENNE PRIME FOUND" >> "$GITHUB_STEP_SUMMARY"
          if [ -f merged_results/merged_new_discoveries.json ]; then
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat merged_results/merged_new_discoveries.json >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
