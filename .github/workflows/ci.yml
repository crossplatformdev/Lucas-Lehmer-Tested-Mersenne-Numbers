name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:
    inputs:
      run_benchmark:
        description: "Run optional benchmark job"
        required: false
        type: boolean
        default: false

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ make libboost-dev pkg-config

      - name: Build
        run: make all

      - name: Run tests
        run: make test

      - name: Build profiling binary
        run: make bin/bignum_prof

      - name: Run profiling (gprof) – index 14 = p=9689, 1 thread
        run: |
          echo "=== Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID} ==="
          echo "Job: build-and-test"
          LL_STOP_AFTER_ONE=1 ./bin/bignum_prof 14 1
          gprof bin/bignum_prof gmon.out > prof_report.txt
          echo "--- gprof flat profile (top 30 lines) ---"
          head -50 prof_report.txt

      - name: Upload profiler report
        uses: actions/upload-artifact@v4
        with:
          name: gprof-report
          path: prof_report.txt
          retention-days: 14

  benchmark:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_benchmark == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ make libboost-dev pkg-config

      - name: Build
        run: make all

      - name: Run benchmark
        run: |
          echo "=== Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID} ==="
          echo "Job: benchmark"
          make bench
