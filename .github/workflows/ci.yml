name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:
    inputs:
      run_benchmark:
        description: "Run optional benchmark job"
        required: false
        type: boolean
        default: false

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ make libboost-dev libgmp-dev

      - name: Build
        run: make all

      - name: Run tests
        run: make test

  benchmark:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_benchmark == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ make libboost-dev libgmp-dev

      - name: Build
        run: make all

      - name: Run benchmark
        run: make bench
