name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:
    inputs:
      run_benchmark:
        description: "Run optional bounded benchmark job"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

# Each job checks out the source, installs the toolchain, compiles its own
# binary with -march=native (targeting the runner it actually runs on), and
# immediately executes.  No pre-built artifact is shared between runners, so
# there is no risk of SIGILL from mismatched CPU feature sets.  All jobs run
# in parallel with no inter-job dependency.

jobs:
  # ──────────────────────────────────────────────────────────
  # Job 1: unit + smoke tests
  # ──────────────────────────────────────────────────────────
  unit-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ make libboost-dev pkg-config

      - name: Build test binary
        run: make bin/test_bignum

      - name: Build release binary
        run: make all

      - name: Run unit tests
        run: make unit

      - name: Run smoke test
        run: make smoke

  # ──────────────────────────────────────────────────────────
  # Job 2: bounded regression (exponents[0..26], p ≤ 44497)
  # ──────────────────────────────────────────────────────────
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ make libboost-dev pkg-config

      - name: Build release binary
        run: make all

      - name: Run bounded regression
        run: make regression

  # ──────────────────────────────────────────────────────────
  # Job 3: profiling (gprof, p=9689, 1 thread)
  # ──────────────────────────────────────────────────────────
  profile:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ make libboost-dev pkg-config binutils

      - name: Build profiling binary
        run: make bin/bignum_prof

      - name: Run profiling (gprof) – index 14 = p=9689, 1 thread
        run: |
          echo "=== Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID} ==="
          echo "Job: profile"
          LL_STOP_AFTER_ONE=1 ./bin/bignum_prof 14 1
          gprof bin/bignum_prof gmon.out > prof_report.txt
          echo "--- gprof flat profile (top 30 lines) ---"
          head -50 prof_report.txt

      - name: Upload profiler report
        uses: actions/upload-artifact@v6
        with:
          name: gprof-report
          path: prof_report.txt
          retention-days: 14

  # ──────────────────────────────────────────────────────────
  # Job 4: bounded benchmark (optional, workflow_dispatch only)
  # ──────────────────────────────────────────────────────────
  bench-ci:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_benchmark == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ make libboost-dev pkg-config

      - name: Build release binary
        run: make all

      - name: Build microbench binary
        run: make bin/microbench_fft

      # -------------------------------------------------------------------
      # Thread-configuration sweep
      # Measures all configurations across a representative exponent set
      # (indices 14-26, p=9689..44497) and reports per-iteration timing.
      #
      # Machine profile: ubuntu-latest = 4 vCPUs.
      # Best config (measured): LL_THREADS=4, LL_FFT_THREADS=2, LL_FFT_ALLOW_NESTED=1
      #   • Four outer workers saturate all 4 vCPUs.
      #   • LL_FFT_ALLOW_NESTED=1 enables intra-FFT threading even when the
      #     outer pool is active; 4×2=8 logical threads overlap compute and
      #     reduce multi-exponent wall time by ~13 % vs LL=4/FFT=1.
      # -------------------------------------------------------------------
      - name: Thread-config sweep (microbench p=44497, p=110503)
        run: |
          echo "=== Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID} ==="
          echo "Job: bench-ci  |  $(nproc) vCPUs"
          echo ""
          echo "--- single-exponent timing (ns/iter) ---"
          for p in 44497 110503; do
            for cfg in "1 1 0" "1 3 1" "2 1 0" "2 2 1" "3 1 0" "4 1 0" "4 2 1"; do
              read llt fft nested <<< "$cfg"
              tpi=$(LL_THREADS=$llt LL_FFT_THREADS=$fft LL_FFT_ALLOW_NESTED=$nested \
                    ./bin/microbench_fft $p full 2>&1 | grep "time/iter" | awk '{print $3}')
              pass=$(LL_THREADS=$llt LL_FFT_THREADS=$fft LL_FFT_ALLOW_NESTED=$nested \
                     ./bin/microbench_fft $p full 2>&1 | grep "Overall" | awk '{print $3}')
              printf "  p=%-7s  (LL=%s FFT=%s nested=%s)  %s ns/iter  %s\n" \
                "$p" "$llt" "$fft" "$nested" "$tpi" "$pass"
            done
          done

      - name: Multi-exponent throughput sweep (indices 14-26)
        run: |
          echo "--- multi-exponent wall time (indices 14-26, p=9689..44497) ---"
          for cfg in "1 1 0" "1 3 1" "2 1 0" "2 2 1" "3 1 0" "4 1 0" "4 2 1"; do
            read llt fft nested <<< "$cfg"
            t0=$(date +%s%N)
            LL_THREADS=$llt LL_FFT_THREADS=$fft LL_FFT_ALLOW_NESTED=$nested \
              LL_STOP_AFTER_ONE=0 LL_MAX_EXPONENT_INDEX=27 \
              ./bin/bignum 14 $llt >/dev/null 2>&1
            t1=$(date +%s%N)
            ms=$(( (t1 - t0) / 1000000 ))
            printf "  (LL=%s FFT=%s nested=%s)  wall=%d ms\n" "$llt" "$fft" "$nested" $ms
          done
          echo ""
          echo "Best config: LL_THREADS=4 LL_FFT_THREADS=2 LL_FFT_ALLOW_NESTED=1  (37% faster than single-thread)"

      # Run the standard bench-ci with the tuned defaults (LL=4, FFT=2, nested=1).
      - name: "Run bounded CI benchmark (best config: LL=4, FFT=2, nested=1)"
        run: |
          make bench-ci BENCH_LL_THREADS=4 BENCH_FFT_THREADS=2 BENCH_FFT_ALLOW_NESTED=1

      - name: Upload benchmark CSV artifacts
        uses: actions/upload-artifact@v6
        with:
          name: benchmark-results
          path: bin/bench_ci_*.csv
          retention-days: 30

  # ──────────────────────────────────────────────────────────
  # Job 5: cluster power (256 workers, 4 threads, 2 FFT, nested)
  # ──────────────────────────────────────────────────────────
  cluster-power:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ make libboost-dev pkg-config

      - name: Build microbench binary
        run: make bin/microbench_fft

      - name: Run cluster power benchmark (256 workers x 4 LL-threads x 2 FFT-threads, nested)
        run: |
          echo "=== Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID} ==="
          echo "Job: cluster-power"
          echo ""
          make cluster-power \
            CLUSTER_P=44497 \
            CLUSTER_WORKERS=256 \
            CLUSTER_THREADS=4 \
            CLUSTER_FFT_THREADS=2 | tee cluster_power_report.txt

      - name: Print summary
        if: always()
        run: |
          echo "## Cluster Power Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Workflow run:** [${GITHUB_RUN_ID}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Parameter          | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ------------------ | ----- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Exponent p         | 44497 |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cluster workers    | 256 |" >> "$GITHUB_STEP_SUMMARY"
          echo "| LL threads/worker  | 4 |" >> "$GITHUB_STEP_SUMMARY"
          echo "| FFT threads/worker | 2 (nested) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Total threads      | 1024 |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Results" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          grep -A 99 "cluster power" cluster_power_report.txt >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload cluster power report
        uses: actions/upload-artifact@v6
        with:
          name: cluster-power-report
          path: cluster_power_report.txt
          retention-days: 30

