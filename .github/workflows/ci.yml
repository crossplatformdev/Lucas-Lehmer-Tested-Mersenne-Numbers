name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:
    inputs:
      run_benchmark:
        description: "Run optional bounded benchmark job"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

# Each job checks out the source, installs the toolchain, compiles its own
# binary with -march=native (targeting the runner it actually runs on), and
# immediately executes.  No pre-built artifact is shared between runners, so
# there is no risk of SIGILL from mismatched CPU feature sets.  All jobs run
# in parallel with no inter-job dependency.

jobs:
  # ──────────────────────────────────────────────────────────
  # Job 1: unit + smoke tests
  # ──────────────────────────────────────────────────────────
  unit-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ make libboost-dev pkg-config

      - name: Build test binary
        run: make bin/test_bignum

      - name: Build release binary
        run: make all

      - name: Run unit tests
        run: make unit

      - name: Run smoke test
        run: make smoke

  # ──────────────────────────────────────────────────────────
  # Job 2: bounded regression (exponents[0..26], p ≤ 44497)
  # ──────────────────────────────────────────────────────────
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ make libboost-dev pkg-config

      - name: Build release binary
        run: make all

      - name: Run bounded regression
        run: make regression

  # ──────────────────────────────────────────────────────────
  # Job 3: profiling (gprof, p=9689, 1 thread)
  # ──────────────────────────────────────────────────────────
  profile:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ make libboost-dev pkg-config binutils

      - name: Build profiling binary
        run: make bin/bignum_prof

      - name: Run profiling (gprof) – index 14 = p=9689, 1 thread
        run: |
          echo "=== Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID} ==="
          echo "Job: profile"
          LL_STOP_AFTER_ONE=1 ./bin/bignum_prof 14 1
          gprof bin/bignum_prof gmon.out > prof_report.txt
          echo "--- gprof flat profile (top 30 lines) ---"
          head -50 prof_report.txt

      - name: Upload profiler report
        uses: actions/upload-artifact@v4
        with:
          name: gprof-report
          path: prof_report.txt
          retention-days: 14

  # ──────────────────────────────────────────────────────────
  # Job 4: bounded benchmark (optional, workflow_dispatch only)
  # ──────────────────────────────────────────────────────────
  bench-ci:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_benchmark == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ make libboost-dev pkg-config

      - name: Build release binary
        run: make all

      - name: Run bounded CI benchmark
        run: |
          echo "=== Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID} ==="
          echo "Job: bench-ci"
          make bench-ci

      - name: Upload benchmark CSV artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: bin/bench_ci_*.csv
          retention-days: 30

